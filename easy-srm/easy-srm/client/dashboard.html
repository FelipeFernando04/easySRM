<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasySRM - Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-slate-700">EasySRM</div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navigate('dashboard')" class="w-full text-left p-3 rounded hover:bg-slate-800">Dashboard</button>
            <button onclick="navigate('suppliers')" class="w-full text-left p-3 rounded hover:bg-slate-800">Fornecedores</button>
            <button onclick="navigate('evaluations')" class="w-full text-left p-3 rounded hover:bg-slate-800">Avaliações</button>
            <button onclick="navigate('purchases')" class="w-full text-left p-3 rounded hover:bg-slate-800">Compras</button>
            <button onclick="navigate('reports')" class="w-full text-left p-3 rounded hover:bg-slate-800">Relatórios</button>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <button id="logoutBtn" class="w-full text-left p-3 rounded bg-red-600 hover:bg-red-700">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 id="pageTitle" class="text-xl font-semibold">Dashboard</h2>
            <div id="userInfo" class="font-medium text-slate-600"></div>
        </header>
        
        <div class="p-6">
            <div id="view-dashboard" class="view-section grid gap-6 grid-cols-1 md:grid-cols-3">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                    <h3 class="text-slate-500 text-sm">Total de Fornecedores</h3>
                    <p id="dash-suppliers" class="text-3xl font-bold mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                    <h3 class="text-slate-500 text-sm">Média de Avaliações</h3>
                    <p id="dash-rating" class="text-3xl font-bold mt-2">0.0</p>
                </div>
            </div>

            <div id="view-suppliers" class="view-section hidden">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 mb-6">
                    <h3 class="font-semibold mb-4">Novo Fornecedor</h3>
                    <form id="supplierForm" class="flex gap-4 items-end">
                        <div class="flex-1">
                            <label class="block text-sm text-slate-600">Nome</label>
                            <input type="text" id="supName" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm text-slate-600">Categoria</label>
                            <input type="text" id="supCategory" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Salvar</button>
                    </form>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-slate-200">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Nome</th>
                                <th class="p-4">Categoria</th>
                                <th class="p-4 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="suppliersTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-evaluations" class="view-section hidden">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                    <form id="evalForm" class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-600">Fornecedor</label>
                            <select id="evalSupplier" class="w-full p-2 border rounded mt-1" required></select>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600">Nota (1 a 5)</label>
                            <input type="number" id="evalRating" min="1" max="5" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600">Comentário</label>
                            <input type="text" id="evalComment" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Avaliar</button>
                    </form>
                </div>
            </div>

            <div id="view-purchases" class="view-section hidden">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                    <form id="purchaseForm" class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-600">Fornecedor</label>
                            <select id="purchSupplier" class="w-full p-2 border rounded mt-1" required></select>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600">Valor (R$)</label>
                            <input type="number" step="0.01" id="purchValue" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600">Data</label>
                            <input type="date" id="purchDate" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Registrar Compra</button>
                    </form>
                </div>
            </div>

            <div id="view-reports" class="view-section hidden">
                <div class="bg-white rounded-lg shadow-sm border border-slate-200 mb-6">
                    <h3 class="p-4 font-semibold border-b">Histórico de Compras</h3>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Data</th>
                                <th class="p-4">Fornecedor</th>
                                <th class="p-4">Valor</th>
                            </tr>
                        </thead>
                        <tbody id="reportsPurchasesTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
