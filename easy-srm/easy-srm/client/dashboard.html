<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasySRM - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-slate-700">EasySRM</div>
        
        <nav id="menu" class="flex-1 p-4 space-y-2">
            </nav>
        
        <div class="p-4 border-t border-slate-700">
            <button id="logoutBtn" class="w-full text-left p-3 rounded bg-red-600 hover:bg-red-700">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 id="pageTitle" class="text-xl font-semibold">Vitrine</h2>
            <div id="userInfo" class="font-medium text-slate-600"></div>
        </header>
        
        <div class="p-6">
            
            <div id="view-vitrine" class="view-section hidden">
                <div id="produtosGrid" class="grid gap-6 grid-cols-1 md:grid-cols-3 lg:grid-cols-4">
                    </div>
            </div>

            <div id="view-meus-pedidos" class="view-section hidden">
                <div class="bg-white rounded-lg shadow-sm border border-slate-200">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Data</th>
                                <th class="p-4">Produto</th>
                                <th class="p-4">Fornecedor</th>
                                <th class="p-4">Total</th>
                                <th class="p-4">Status</th>
                            </tr>
                        </thead>
                        <tbody id="meusPedidosTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-meus-produtos" class="view-section hidden">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 mb-6">
                    <h3 class="font-semibold mb-4">Cadastrar Novo Produto</h3>
                    <form id="productForm" class="flex gap-4 items-end">
                        <div class="flex-1">
                            <label class="block text-sm text-slate-600">Nome do Produto</label>
                            <input type="text" id="prodName" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <div class="w-32">
                            <label class="block text-sm text-slate-600">Preço (R$)</label>
                            <input type="number" step="0.01" id="prodPrice" class="w-full p-2 border rounded mt-1" required>
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Adicionar</button>
                    </form>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-slate-200">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Nome do Produto</th>
                                <th class="p-4">Preço</th>
                                <th class="p-4 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="meusProdutosTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-pedidos-recebidos" class="view-section hidden">
                <div class="bg-white rounded-lg shadow-sm border border-slate-200">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Data</th>
                                <th class="p-4">Cliente</th>
                                <th class="p-4">Produto</th>
                                <th class="p-4">Qtd</th>
                                <th class="p-4">Total</th>
                            </tr>
                        </thead>
                        <tbody id="pedidosRecebidosTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
