<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasySRM - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">EasySRM</h1>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Usuário</label>
                <input type="text" id="username" class="mt-1 w-full p-2 border rounded focus:ring focus:ring-blue-200" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Senha</label>
                <input type="password" id="password" class="mt-1 w-full p-2 border rounded focus:ring focus:ring-blue-200" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-medium">Entrar</button>
            <p id="errorMsg" class="text-red-500 text-sm hidden text-center"></p>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
